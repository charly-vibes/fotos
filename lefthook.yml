# lefthook.yml - pre-commit/pre-push hooks
#
# Install: lefthook install
# Bypass (WIP only): git commit/push --no-verify
#
# Clippy and tests need system libs (leptonica, pipewire) that live inside the
# fedora distrobox on Bluefin hosts. We auto-detect and run through distrobox
# when available; fmt-check always works on the host.

pre-commit:
  commands:
    fmt-check:
      glob: "*.rs"
      run: cargo fmt --all -- --check

pre-push:
  parallel: true
  commands:
    clippy:
      glob: "*.rs"
      run: |
        if command -v distrobox &>/dev/null && distrobox list 2>/dev/null | grep -q fedora; then
          RUN="distrobox enter fedora --"
        else
          RUN=""
        fi
        triple=$($RUN rustc -vV | grep '^host:' | cut -d' ' -f2)
        touch "src-tauri/fotos-mcp-${triple}"
        $RUN cargo clippy --workspace -- -D warnings
        ret=$?
        rm -f src-tauri/fotos-mcp-*-unknown-*
        exit $ret
    test:
      run: |
        if command -v distrobox &>/dev/null && distrobox list 2>/dev/null | grep -q fedora; then
          RUN="distrobox enter fedora --"
        else
          RUN=""
        fi
        triple=$($RUN rustc -vV | grep '^host:' | cut -d' ' -f2)
        touch "src-tauri/fotos-mcp-${triple}"
        $RUN cargo test --workspace
        ret=$?
        rm -f src-tauri/fotos-mcp-*-unknown-*
        exit $ret

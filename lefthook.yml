# lefthook.yml - pre-commit/pre-push hooks
#
# Install: lefthook install
# Bypass (WIP only): git commit/push --no-verify
#
# NOTE: clippy and tests need system libs (leptonica, pipewire) that live
# inside the fedora distrobox on Bluefin hosts. fmt-check works on the host.

pre-commit:
  commands:
    fmt-check:
      glob: "*.rs"
      run: cargo fmt --all -- --check

pre-push:
  parallel: true
  commands:
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace -- -D warnings
    test:
      run: cargo test --workspace
      fail_text: |
        Tests failed. Push blocked.
        If system libs are missing, run inside distrobox or use: git push --no-verify
